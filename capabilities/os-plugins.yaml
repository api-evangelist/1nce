naftiko: 1.0.0-alpha2
info:
  label: "1NCE OS \u2014 Plugin System"
  description: "1NCE OS \u2014 Plugin System. 8 operations. Lead operation: Install Datacake plugin for 1NCE OS. Self-contained\
    \ Naftiko capability covering one 1NCE business surface."
  tags:
    - 1NCE
    - IoT
    - Plugins
    - Partners
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      ONE_NCE_ACCESS_TOKEN: ONE_NCE_ACCESS_TOKEN
capability:
  consumes:
    - type: http
      namespace: os-plugins
      baseUri: https://api.1nce.com/management-api
      description: "1NCE OS \u2014 Plugin System business capability. Self-contained, no shared references."
      resources:
        - name: v1-partners-datacake-plugins
          path: /v1/partners/DATACAKE/plugins
          operations:
            - name: create-plugins
              method: POST
              description: Install Datacake plugin for 1NCE OS
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: true
        - name: v1-partners-mender-plugins
          path: /v1/partners/MENDER/plugins
          operations:
            - name: create-plugins
              method: POST
              description: Install Mender plugin for 1NCE OS
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: true
        - name: v1-partners-tartabit-plugins
          path: /v1/partners/TARTABIT/plugins
          operations:
            - name: create-plugins
              method: POST
              description: Install Tartabit plugin for 1NCE OS
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: true
        - name: v1-partners-memfault-plugins
          path: /v1/partners/MEMFAULT/plugins
          operations:
            - name: create-plugins
              method: POST
              description: Install Memfault plugin for 1NCE OS
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: true
        - name: v1-partners-plugins-pluginid
          path: /v1/partners/plugins/{pluginId}
          operations:
            - name: delete-plugins
              method: DELETE
              description: Uninstall a specific plugin by ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
            - name: get-plugins
              method: GET
              description: Get details about a specific plugin installation
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-partners-plugins-pluginid-restart
          path: /v1/partners/plugins/{pluginId}/restart
          operations:
            - name: create-restart
              method: POST
              description: Restart a failed plugin by installation ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: true
        - name: v1-partners-plugins
          path: /v1/partners/plugins
          operations:
            - name: get-plugins
              method: GET
              description: Get a list of plugin installations
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
      authentication:
        type: bearer
        token: '{{env.ONE_NCE_ACCESS_TOKEN}}'
  exposes:
    - type: rest
      namespace: os-plugins-rest
      port: 8080
      description: "REST adapter for 1NCE OS \u2014 Plugin System. One Spectral-compliant resource per consumed operation,\
        \ prefixed with /v1."
      resources:
        - path: /v1/v1/partners/DATACAKE/plugins
          name: v1-partners-datacake-plugins
          description: REST surface for v1-partners-datacake-plugins.
          operations:
            - method: POST
              name: create-plugins
              description: Install Datacake plugin for 1NCE OS
              call: os-plugins.create-plugins
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/partners/MENDER/plugins
          name: v1-partners-mender-plugins
          description: REST surface for v1-partners-mender-plugins.
          operations:
            - method: POST
              name: create-plugins
              description: Install Mender plugin for 1NCE OS
              call: os-plugins.create-plugins
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/partners/TARTABIT/plugins
          name: v1-partners-tartabit-plugins
          description: REST surface for v1-partners-tartabit-plugins.
          operations:
            - method: POST
              name: create-plugins
              description: Install Tartabit plugin for 1NCE OS
              call: os-plugins.create-plugins
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/partners/MEMFAULT/plugins
          name: v1-partners-memfault-plugins
          description: REST surface for v1-partners-memfault-plugins.
          operations:
            - method: POST
              name: create-plugins
              description: Install Memfault plugin for 1NCE OS
              call: os-plugins.create-plugins
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/partners/plugins/{pluginId}
          name: v1-partners-plugins-pluginid
          description: REST surface for v1-partners-plugins-pluginid.
          operations:
            - method: DELETE
              name: delete-plugins
              description: Uninstall a specific plugin by ID
              call: os-plugins.delete-plugins
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
            - method: GET
              name: get-plugins
              description: Get details about a specific plugin installation
              call: os-plugins.get-plugins
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/partners/plugins/{pluginId}/restart
          name: v1-partners-plugins-pluginid-restart
          description: REST surface for v1-partners-plugins-pluginid-restart.
          operations:
            - method: POST
              name: create-restart
              description: Restart a failed plugin by installation ID
              call: os-plugins.create-restart
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/partners/plugins
          name: v1-partners-plugins
          description: REST surface for v1-partners-plugins.
          operations:
            - method: GET
              name: get-plugins
              description: Get a list of plugin installations
              call: os-plugins.get-plugins
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: os-plugins-mcp
      port: 9090
      transport: http
      description: "MCP adapter for 1NCE OS \u2014 Plugin System. One tool per consumed operation, routed inline through this\
        \ capability consumes block."
      tools:
        - name: 1nce-create-plugins
          description: Install Datacake plugin for 1NCE OS
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: os-plugins.create-plugins
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-create-plugins
          description: Install Mender plugin for 1NCE OS
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: os-plugins.create-plugins
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-create-plugins
          description: Install Tartabit plugin for 1NCE OS
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: os-plugins.create-plugins
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-create-plugins
          description: Install Memfault plugin for 1NCE OS
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: os-plugins.create-plugins
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-delete-plugins
          description: Uninstall a specific plugin by ID
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: os-plugins.delete-plugins
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-get-plugins
          description: Get details about a specific plugin installation
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: os-plugins.get-plugins
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-create-restart
          description: Restart a failed plugin by installation ID
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: os-plugins.create-restart
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-get-plugins
          description: Get a list of plugin installations
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: os-plugins.get-plugins
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
