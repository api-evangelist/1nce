naftiko: 1.0.0-alpha2
info:
  label: "1NCE Order Management \u2014 Orders"
  description: "1NCE Order Management \u2014 Orders. 3 operations. Lead operation: Get All Orders. Self-contained Naftiko\
    \ capability covering one 1NCE business surface."
  tags:
    - 1NCE
    - Orders
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      ONE_NCE_ACCESS_TOKEN: ONE_NCE_ACCESS_TOKEN
capability:
  consumes:
    - type: http
      namespace: order-management-orders
      baseUri: https://api.1nce.com/management-api
      description: "1NCE Order Management \u2014 Orders business capability. Self-contained, no shared references."
      resources:
        - name: v1-orders
          path: /v1/orders
          operations:
            - name: get-orders
              method: GET
              description: Get All Orders
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
            - name: create-orders
              method: POST
              description: Create Order
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: true
        - name: v1-orders-order-number
          path: /v1/orders/{order_number}
          operations:
            - name: get-orders
              method: GET
              description: Get Single Order
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
      authentication:
        type: bearer
        token: '{{env.ONE_NCE_ACCESS_TOKEN}}'
  exposes:
    - type: rest
      namespace: order-management-orders-rest
      port: 8080
      description: "REST adapter for 1NCE Order Management \u2014 Orders. One Spectral-compliant resource per consumed operation,\
        \ prefixed with /v1."
      resources:
        - path: /v1/v1/orders
          name: v1-orders
          description: REST surface for v1-orders.
          operations:
            - method: GET
              name: get-orders
              description: Get All Orders
              call: order-management-orders.get-orders
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
            - method: POST
              name: create-orders
              description: Create Order
              call: order-management-orders.create-orders
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/orders/{order_number}
          name: v1-orders-order-number
          description: REST surface for v1-orders-order-number.
          operations:
            - method: GET
              name: get-orders
              description: Get Single Order
              call: order-management-orders.get-orders
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: order-management-orders-mcp
      port: 9090
      transport: http
      description: "MCP adapter for 1NCE Order Management \u2014 Orders. One tool per consumed operation, routed inline through\
        \ this capability consumes block."
      tools:
        - name: 1nce-get-orders
          description: Get All Orders
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: order-management-orders.get-orders
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-create-orders
          description: Create Order
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: order-management-orders.create-orders
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-get-orders
          description: Get Single Order
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: order-management-orders.get-orders
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
