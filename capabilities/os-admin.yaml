naftiko: 1.0.0-alpha2
info:
  label: "1NCE OS \u2014 Administration"
  description: "1NCE OS \u2014 Administration. 6 operations. Lead operation: Accept 1NCE OS Agreements. Self-contained Naftiko\
    \ capability covering one 1NCE business surface."
  tags:
    - 1NCE
    - IoT
    - Administration
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      ONE_NCE_ACCESS_TOKEN: ONE_NCE_ACCESS_TOKEN
capability:
  consumes:
    - type: http
      namespace: os-admin
      baseUri: https://api.1nce.com/management-api
      description: "1NCE OS \u2014 Administration business capability. Self-contained, no shared references."
      resources:
        - name: v1-agreements-1nceos
          path: /v1/agreements/1nceos
          operations:
            - name: create-1nceos
              method: POST
              description: Accept 1NCE OS Agreements
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: true
        - name: v1-administrationlogs
          path: /v1/administrationLogs
          operations:
            - name: get-administrationlogs
              method: GET
              description: Get Administration Logs
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-administrationlogs-stats
          path: /v1/administrationLogs/stats
          operations:
            - name: get-stats
              method: GET
              description: Get Administration Logs Statistics
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-administrationlogs-adminlogid-payload
          path: /v1/administrationLogs/{adminLogId}/payload
          operations:
            - name: get-payload
              method: GET
              description: Get Administration Log Payload
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-settings-1nceos-name
          path: /v1/settings/1nceos/{name}
          operations:
            - name: patch-1nceos
              method: PATCH
              description: Patch Settings
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: true
        - name: v1-settings-1nceos
          path: /v1/settings/1nceos
          operations:
            - name: get-1nceos
              method: GET
              description: Get customer settings
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
      authentication:
        type: bearer
        token: '{{env.ONE_NCE_ACCESS_TOKEN}}'
  exposes:
    - type: rest
      namespace: os-admin-rest
      port: 8080
      description: "REST adapter for 1NCE OS \u2014 Administration. One Spectral-compliant resource per consumed operation,\
        \ prefixed with /v1."
      resources:
        - path: /v1/v1/agreements/1nceos
          name: v1-agreements-1nceos
          description: REST surface for v1-agreements-1nceos.
          operations:
            - method: POST
              name: create-1nceos
              description: Accept 1NCE OS Agreements
              call: os-admin.create-1nceos
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/administrationLogs
          name: v1-administrationlogs
          description: REST surface for v1-administrationlogs.
          operations:
            - method: GET
              name: get-administrationlogs
              description: Get Administration Logs
              call: os-admin.get-administrationlogs
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/administrationLogs/stats
          name: v1-administrationlogs-stats
          description: REST surface for v1-administrationlogs-stats.
          operations:
            - method: GET
              name: get-stats
              description: Get Administration Logs Statistics
              call: os-admin.get-stats
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/administrationLogs/{adminLogId}/payload
          name: v1-administrationlogs-adminlogid-payload
          description: REST surface for v1-administrationlogs-adminlogid-payload.
          operations:
            - method: GET
              name: get-payload
              description: Get Administration Log Payload
              call: os-admin.get-payload
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/settings/1nceos/{name}
          name: v1-settings-1nceos-name
          description: REST surface for v1-settings-1nceos-name.
          operations:
            - method: PATCH
              name: patch-1nceos
              description: Patch Settings
              call: os-admin.patch-1nceos
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/v1/settings/1nceos
          name: v1-settings-1nceos
          description: REST surface for v1-settings-1nceos.
          operations:
            - method: GET
              name: get-1nceos
              description: Get customer settings
              call: os-admin.get-1nceos
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: os-admin-mcp
      port: 9090
      transport: http
      description: "MCP adapter for 1NCE OS \u2014 Administration. One tool per consumed operation, routed inline through\
        \ this capability consumes block."
      tools:
        - name: 1nce-create-1nceos
          description: Accept 1NCE OS Agreements
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: os-admin.create-1nceos
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-get-administrationlogs
          description: Get Administration Logs
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: os-admin.get-administrationlogs
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-get-stats
          description: Get Administration Logs Statistics
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: os-admin.get-stats
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-get-payload
          description: Get Administration Log Payload
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: os-admin.get-payload
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-patch-1nceos
          description: Patch Settings
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: os-admin.patch-1nceos
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: 1nce-get-1nceos
          description: Get customer settings
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: os-admin.get-1nceos
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
