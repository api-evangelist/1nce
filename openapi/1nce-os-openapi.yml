components:
  parameters:
    namePrefixGeofences:
      description: Name or Prefix of Geofence
      explode: true
      in: query
      name: name
      required: false
      schema:
        type: string
      style: form
    scope:
      description: scope of geofences
      explode: true
      in: query
      name: scope
      required: false
      schema:
        enum:
        - global
        - device
        type: string
      style: form
    geofenceId:
      description: unique geofence ID
      explode: false
      in: path
      name: geofenceId
      required: true
      schema:
        type: string
      style: simple
    page:
      description: Number of the requested page. Use this parameter to iterate through all items on the different pages. The
        total amount of pages is listed in the response body (pageAmount).
      explode: true
      in: query
      name: page
      required: false
      schema:
        default: 1
        maximum: 50
        minimum: 1
        type: integer
      style: form
    pageSize:
      description: Parameter for specifying the queried items per page.
      explode: true
      in: query
      name: pageSize
      required: false
      schema:
        default: 10
        example: 10
        minimum: 1
        type: integer
      style: form
    sort:
      description: Sort values based on keys that are listed as a comma seperated list, prepend "-" for descending order.
      explode: true
      in: query
      name: sort
      required: false
      schema:
        example: iccid,-ip
        type: string
      style: form
    deviceId:
      description: The unique device ID which identifies each 1NCE SIM. Can be obtained from the Get All Devices API query.
        For 1NCE SIMS the device ID is equal to its iccid.
      explode: false
      in: path
      name: deviceId
      required: true
      schema:
        example: <device_id>
        type: string
      style: simple
    requestId:
      description: ID of device action request
      explode: false
      in: path
      name: requestId
      required: true
      schema:
        example: <request_id>
        type: string
      style: simple
    deviceIdQuery:
      description: The unique device ID which identifies each 1NCE SIM. Can be obtained from the Get All Devices API query.
        For 1NCE SIMS the device ID is equal to its iccid.
      explode: true
      in: query
      name: deviceId
      required: false
      schema:
        example: <device_id>
        type: string
      style: form
    iccidQuery:
      description: ICCID of a SIM device, used to identifiy each 1NCE SIM.
      explode: true
      in: query
      name: iccid
      required: false
      schema:
        example: '8988280666000000000'
        type: string
      style: form
    startDateTime:
      description: Timestamp from where onwards the historic data messages should be queried.
      explode: true
      in: query
      name: startDateTime
      required: false
      schema:
        example: '2022-03-07T08:51:29.015Z'
        type: string
      style: form
    endDateTime:
      description: Timestamp until when the historic data messages should be queried.
      explode: true
      in: query
      name: endDateTime
      required: false
      schema:
        example: '2022-03-07T09:51:29.015Z'
        type: string
      style: form
    protocol:
      description: 'Filter out data for specific protocols: <ul><li>LWM2M</li><li>UDP</li><li>COAP</li></ul>'
      explode: true
      in: query
      name: protocol
      required: false
      schema:
        example: COAP
        type: string
      style: form
    protocolLimited:
      description: 'Filter out by specific protocols: <ul><li>UDP</li><li>COAP</li></ul>'
      explode: true
      in: query
      name: protocol
      required: false
      schema:
        enum:
        - UDP
        - COAP
        example: COAP
        type: string
      style: form
    nextToken:
      description: This API query uses token-based pagination. Each queried page will include a nextToken for accessing the
        next page for pagination. Please use the returned token in the nextToken query parameters to obtain the next page.
      explode: true
      in: query
      name: nextToken
      required: false
      schema:
        example: <next_token>
        type: string
      style: form
    interval:
      description: The interval for which grouping of statistics should occur.
      explode: true
      in: query
      name: interval
      required: false
      schema:
        example: 1d
        type: string
      style: form
    language:
      description: Identifies in what language the description should be returned.
      explode: true
      in: query
      name: language
      required: false
      schema:
        enum:
        - en
        - de
        example: en
        type: string
      style: form
    protocolPath:
      description: 'Available protocols: <ul><li>LWM2M</li><li>UDP</li><li>COAP</li></ul>'
      explode: false
      in: path
      name: protocol
      required: true
      schema:
        example: COAP
        type: string
      style: simple
    integrationIdPath:
      description: unique integration ID
      explode: false
      in: path
      name: integrationId
      required: true
      schema:
        type: string
      style: simple
    rangeQuery:
      description: Specify the range in days to receive data about.
      explode: true
      in: query
      name: range
      required: false
      schema:
        default: '1'
        enum:
        - '1'
        - '7'
        - '30'
        example: '1'
        type: string
      style: form
    adminLogId:
      description: Unique Id of the administration log for which the payload should be queried.
      explode: false
      in: path
      name: adminLogId
      required: true
      schema:
        example: <admin_log_id>
        type: string
      style: simple
    qQuery:
      description: 'Filter parameter in <i>{filter}:{value}</i> format. Expects comma separated list of filtering criteria
        out of the following fields: <ul><li>geofenceId</li><li>category</li><li>iccid</li><li>type</li><li>startDateTime
        (UTC)</li><li>endDateTime (UTC)</li></ul><p><b>Example:</b> "type:device,iccid:ICCID,startDateTime:2022-11-14T16:04:38.000Z"</p>'
      explode: true
      in: query
      name: q
      required: false
      schema:
        example: type:device,iccid:<iccid>;startDateTime:<utc_date>
        type: string
      style: form
    timezone:
      description: Specify the needed timezone as string parameter (e.g., Europe/Amsterdam) for the resulting query output.
      explode: true
      in: query
      name: timezone
      required: true
      schema:
        default: Europe/Amsterdam
        example: Europe/Amsterdam
        type: string
      style: form
    adminLogCategoryQuery:
      description: Specify the category as string parameter for the resulting query output.
      explode: true
      in: query
      name: category
      required: false
      schema:
        enum:
        - info
        - error
        example: info
        type: string
      style: form
    sortArraySampleTime:
      description: Comma seperated list of device property keys in order. Prefix key with `-` to sort descending.
      explode: false
      in: query
      name: sort
      required: false
      schema:
        items:
          default: -sampleTime
          type: string
        type: array
      style: form
    source:
      description: Source of the position.
      explode: true
      in: query
      name: source
      required: false
      schema:
        enum:
        - GPS
        - CellTower
        type: string
      style: form
    startDateTimeCommon:
      explode: true
      in: query
      name: startDateTime
      required: false
      schema:
        example: '2022-01-01T01:01:01.000Z'
        type: string
      style: form
    endDateTimeCommon:
      explode: true
      in: query
      name: endDateTime
      required: false
      schema:
        example: '2022-01-01T01:01:02Z'
        type: string
      style: form
    startDateTimeActivity:
      description: Timestamp from where onwards the historic data should be queried. If not provided while "endDateTime" is
        provided defaults to 1 day before "endDateTime" timestamp, otherwise defaults to 1 day from now
      explode: true
      in: query
      name: startDateTime
      required: false
