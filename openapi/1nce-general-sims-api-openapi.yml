        country:
          type: object
          description: Represents a Country.
          required:
          - country_id
          - name
          - country_code
          - mcc
          - iso_code
          properties:
            country_id:
              type: string
              example: '74'
              description: The Country's id. 0 represents the "ANY"-country.
            name:
              type: string
              example: Germany
              description: String name of the country where the SIM device is currently located.
            country_code:
              example: '49'
