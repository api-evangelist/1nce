components:
  schemas:
    postResponseschema_5:
      additionalProperties: false
      description: Post Webhook integration response
      properties:
        name:
          description: Name of the new Webhook integration.
          example: <integraton_name>
          maxLength: 128
          minLength: 1
          type: string
        eventTypes:
          description: A list of event types
          items:
            $ref: '#/components/schemas/postResponseschema_4_eventTypes_inner'
          minItems: 1
          type: array
        state:
          description: State of the new Webhook integration.
          enum:
          - ROLLOUT_DONE
          - INTEGRATION_ACTIVE
          - INTEGRATION_FAILED
          example: ROLLOUT_DONE
          minLength: 1
          type: string
        type:
          description: Type of the new integration.
          enum:
          - WEBHOOK
          example: WEBHOOK
          minLength: 1
          type: string
        id:
          description: ID of the new Webhook integration.
          example: <integration_id>
          minLength: 1
          type: string
        createdTime:
          description: Created timestamp of the Webhook integration.
          example: '2022-03-07T08:51:29.015Z'
          format: date-time
          type: string
        updatedTime:
          description: Updated timestamp of the Webhook integration.
          example: '2022-03-07T08:51:29.015Z'
          format: date-time
          type: string
        headers:
          description: Headers of the new Webhook integration.
          type: object
        url:
          description: URL of the new Webhook integration.
          example: https://example.com
          format: uri
          minLength: 1
          type: string
        jsonPayloadEnabled:
          default: false
          description: Flag if the payloads of this integration should be bridged in JSON format.
          example: true
          type: boolean
      required:
      - createdTime
      - eventTypes
      - headers
      - id
      - jsonPayloadEnabled
      - name
      - state
      - type
      - updatedTime
      - url
      title: Webhook Integration response
      type: object
    bulkPostschema_2:
      additionalProperties: false
      description: Bulk Post UDP device action.
      properties:
        deviceIds:
          description: Devices that should receive the data
          items:
            example: <device_id>
            pattern: ^[a-zA-Z0-9_-]{1,}$
            type: string
          maxItems: 100
          minItems: 1
          type: array
        payload:
          description: Data that should be sent to the devices
          example: enable_sensor
          type: string
        payloadType:
          description: Type of the payload
          enum:
          - STRING
          - BASE64
          type: string
        port:
          description: Communication port number of the devices
          example: 3000
          maximum: 65535
          minimum: 1
          type: integer
        requestMode:
          default: SEND_NOW
          description: Action request execution mode
          enum:
          - SEND_NOW
          - SEND_WHEN_ACTIVE
          type: string
      required:
      - deviceIds
      - payload
      - payloadType
      - port
      title: Device action request
      type: object
    postschema_6:
      additionalProperties: false
      description: Post AWS integration request
      properties:
        name:
          description: Name of the new AWS integration.
          example: <integraton_name>
          maxLength: 128
          minLength: 1
          type: string
        eventTypes:
          description: A list of event types
          items:
            $ref: '#/components/schemas/postschema_6_eventTypes_inner'
          minItems: 1
          type: array
        jsonPayloadEnabled:
          default: false
          description: Flag if the payloads of this integration should be bridged in JSON format.
          example: true
          type: boolean
      required:
      - eventTypes
      - name
      title: AWS Integration request
      type: object
    patchschema:
      additionalProperties: false
      description: Patch status for device endpoint request.
      properties:
        active:
          deprecated: true
          description: Not used.
          example: true
          type: boolean
        settings:
          items:
            $ref: '#/components/schemas/patchschema_settings_inner'
          type: array
      required:
      - settings
      title: Device Endpoint Patch Request
      type: object
    getResponseschema_2_items_inner:
      additionalProperties: false
      properties:
        id:
          description: The unique ID of the import job.
          example: <job_id>
          type: string
        createdAt:
          description: Time when job created
          example: '2022-03-07T08:51:29.015Z'
          format: date-time
          type: string
        updatedAt:
          description: Time when job last updated
          example: '2022-03-07T08:51:29.015Z'
          format: date-time
          type: string
        status:
          description: Status of the job.
          enum:
          - IN_PROGRESS
          - DONE
          type: string
        amount:
          description: Total number of device PSK to import
          example: 2
          type: number
        failed:
          description: Number of device PSK imports failed
          example: 1
          type: number
        done:
          description: Number of device PSK imports succeeded
          example: 1
          type: number
      required:
      - amount
      - createdAt
      - done
      - failed
      - id
      - status
      - updatedAt
      type: object
    getResponseschema_settings_inner:
      properties:
        name:
          description: Name of the setting.
          example: LWM2M_PASSIVE_REPORTING
          type: string
        state:
          description: State of the setting.
          enum:
          - ENABLED
          - DISABLED
          example: ENABLED
          type: string
        description:
          description: Description of the setting.
          example: This is an example description of a setting
          type: string
      required:
      - name
      - state
      type: object
    postschema_3:
      additionalProperties: false
      description: Post UDP device action.
      properties:
        payload:
          description: Data that should be sent to a device
          example: enable_sensor
          type: string
        payloadType:
          description: Type of the payload
          enum:
          - STRING
          - BASE64
          type: string
        port:
          description: Communication port number of a device
          example: 3000
          maximum: 65535
          minimum: 1
          type: integer
        requestMode:
          default: SEND_NOW
          description: Action request execution mode
          enum:
          - SEND_NOW
          - SEND_WHEN_ACTIVE
          type: string
      required:
      - payload
      - payloadType
      - port
      title: Device action request
      type: object
    getAllResponseschema_items_inner:
      properties:
        protocol:
          description: The protocol of the endpoint.
          example: COAP
          type: string
        active:
          description: The current status of the endpoint.
          example: true
          type: boolean
        domain:
          description: The domain of the endpoint.
          example: coap.os.1nce.com
          type: string
        ipAddresses:
          items:
            description: The public IP addresses of the endpoint.
            example: 127.0.0.1
            type: string
          type: array
        port:
          description: The port of the endpoint.
          example: 5683
          type: number
        securePort:
          description: The port of the endpoint.
          example: 5684
          type: number
      required:
      - active
      - domain
      - ipAddresses
      - port
      - protocol
      type: object
    patchschema_3:
      additionalProperties: false
      description: Patch integration request
      properties:
        url:
          description: URL of the webhook (HTTPS required)
          example: https://www.example.com
          format: uri
          type: string
        headers:
          additionalProperties:
            type: string
          description: Headers that should be sent to the webhook. Only string values and no nested objects
          type: object
        eventTypes:
          description: A list of all event types
          items:
            $ref: '#/components/schemas/patchschema_3_eventTypes_inner'
          minItems: 1
          type: array
        jsonPayloadEnabled:
          description: Flag if the payloads of this integration should be bridged in JSON format.
          example: true
          type: boolean
      title: Integration request
      type: object
    patchResponseschema:
      additionalProperties: false
      description: Response to the patch device endpoints request.
      properties:
        protocol:
          description: The protocol of the endpoint.
          example: COAP
          type: string
        active:
          description: The current status of the endpoint.
          example: true
          type: boolean
        domain:
          description: The domain of the endpoint.
          example: coap.os.1nce.com
          type: string
        ipAddresses:
          items:
            description: The public IP addresses of the endpoint.
            example: 127.0.0.1
            type: string
          type: array
        port:
          description: The port of the endpoint.
          example: 5683
          type: number
        securePort:
          description: The port of the endpoint.
          example: 5684
          type: number
        settings:
          items:
            $ref: '#/components/schemas/getResponseschema_settings_inner'
          type: array
      required:
      - active
      - domain
      - ipAddresses
      - port
      - protocol
      - settings
      title: Patch Device Endpoints Response
      type: object
    getAllResponseschema_5_items_inner:
      properties:
        id:
          description: Unique ID of the Integration
          example: 2BLURnaUZSlbKp6vN1V5dYiJvC4
          minLength: 1
          type: string
        lastSuccessfulMessageDelivery:
          description: Timestamp of the first message successfully delivered to integration, in ISO 8601 format
          example: '2022-03-07T08:51:29.015Z'
          format: date-time
          type: string
        name:
          description: name
          example: a-sample-integration-name
          minLength: 1
          type: string
        eventTypes:
          description: A list of event types
          items:
            $ref: '#/components/schemas/postResponseschema_4_eventTypes_inner'
          minItems: 1
          type: array
        state:
          description: Current state of the Integration
          enum:
          - ROLLOUT_STARTED
          - ROLLOUT_DONE
          - ROLLOUT_FAILED
          - INTEGRATION_FAILED
          - INTEGRATION_ACTIVE
          type: string
        type:
          description: Type of the Integration
          enum:
          - AWS
          - WEBHOOK
          type: string
        createdTime:
          description: Created timestamp of Integration
          example: '2022-03-07T08:51:29.015Z'
          format: date-time
          type: string
        updatedTime:
          description: Updated timestamp of Integration
          example: '2022-03-07T08:51:29.015Z'
          format: date-time
          type: string
        jsonPayloadEnabled:
          default: false
          description: Flag if the payloads of this integration should be bridged in JSON format.
          example: true
          type: boolean
      required:
      - createdTime
      - eventTypes
      - id
      - jsonPayloadEnabled
      - name
      - state
      - type
      - updatedTime
      type: object
    postschema_inner:
      additionalProperties: false
      properties:
        deviceId:
          description: The unique ID of the device.
          example: <device_id>
          type: string
        secretKey:
          description: Pre-shared secret key for a device.
          example: <custom_pre-shared_key>
          maxLength: 128
          minLength: 8
          type: string
        protocol:
          description: Protocol PSK is applied for
          enum:
          - COAP
          - LWM2M
          type: string
        format:
          description: The format in which the secret key was provided.
          enum:
          - STRING
          - HEX
          type: string
      required:
      - deviceId
      - protocol
      - secretKey
      type: object
    patchschema_settings_inner:
      properties:
        name:
          description: Name of the setting.
          enum:
          - LWM2M_PASSIVE_REPORTING
          type: string
        state:
          description: State of the setting.
          enum:
          - ENABLED
          - DISABLED
          example: ENABLED
          type: string
      required:
      - name
      - state
      type: object
    getArchivedResponseschema_items_inner:
      additionalProperties: false
      properties:
        id:
          description: The ID of the request.
          example: <request_id>
          type: string
        status:
          description: The status of the request.
          enum:
          - FAILED
          - SUCCEEDED
          - CANCELLED
          example: SUCCEEDED
          type: string
        deviceId:
          description: The unique ID of the device.
          example: <device_id>
          type: string
        ip:
          description: The IP address of the device.
          example: x.x.x.x
          type: string
        protocol:
          description: The protocol of the request.
          enum:
          - UDP
          - COAP
          - LWM2M
          example: LWM2M
          type: string
        created:
          description: The timestamp at which the request was created.
          format: date-time
          type: string
        updated:
          description: The timestamp at which the request was updated.
          format: date-time
          type: string
        mode:
          description: The mode of the request.
          enum:
          - SEND_NOW
          - SEND_WHEN_ACTIVE
          example: SEND_NOW
          type: string
        resultData:
          description: Result data (can include response from device etc.).
          type: object
        requestData:
          description: Protocol specific request data.
